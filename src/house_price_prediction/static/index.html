                <!-- Section 2: Size & Structure -->
                <div class="section">
                    <div class="section-header">
                        <span class="section-num">02 —</span>
                        <span class="section-title">Size and Structure</span>
                    </div>
                    <div class="fields">
                        <div class="field">
                            <label>Living Area (sq ft)</label>
                            <div class="range-wrap">
                                <div class="range-val" id="sqftVal">1,500 <sup>sq ft</sup></div>
                                <input type="range" id="sqft" min="300" max="10000" step="50" value="1500"
                                    oninput="document.getElementById('sqftVal').innerHTML = Number(this.value).toLocaleString() + ' <sup>sq ft</sup>'" />

                                    oninput="document.getElementById('lotVal').innerHTML = Number(this.value).toLocaleString() + ' <sup>sq ft</sup>'" />

                        <!-- </div> -->
                        <div class="field">
                            <label>Bedrooms</label>
                            <select id="bedrooms" required>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3" selected>3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7+</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Bathrooms</label>
                            <select id="bathrooms" required>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3" selected>3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7+</option>
                            </select>
                        </div>
                        <!-- <div class="field">
                            <label>Year Built</label>
                            <input type="number" placeholder="e.g. 1998" min="1800" max="2025" />
                        </div> -->
                        <div class="field">
                            <label>Stories</label>
                            <select id="stories" required>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3" selected>3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7+</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Parking</label>
                            <select id="parking" required>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3" selected>3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7+</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Section 3: Condition & Features -->
                <div class="section">
                    <div class="section-header">
                        <span class="section-num">03 —</span>
                        <span class="section-title">Condition and Features</span>
                    </div>
                    <div class="fields">
                        <div class="field">
                            <label>Guest Room</label>
                            <select id="guest_room">
                                <option value="yes" selected>yes</option>
                                <option value="no">no</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Air Conditioning</label>
                            <select id="air_conditioning">
                                <option value="yes" selected>yes</option>
                                <option value="no">no</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Hot Water Heater</label>
                            <select id="hot_water_heater">
                                <option value="yes" selected>yes</option>
                                <option value="no">no</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Basement</label>
                            <select id="basement">
                                <option value="yes" selected>yes</option>
                                <option value="no">no</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Furnishing Status</label>
                            <select id="furnishing">
                                <option value="yes" selected>furnished</option>
                                <option value="no">semi-furnished</option>
                            </select>
                        </div>
                    </div>

                        </div>

                </div>

                <!-- Section 4: Market Context -->
                <div class="section">
                    <div class="section-header">
                        <span class="section-num">04 —</span>
                        <span class="section-title">Market Context</span>
                    </div>
                    <div class="fields wide">
                        <div class="field">
                            <label>Nearby Comparable</label>
                            <select id="mainroad">
                                <option value="yes" selected>Near Mainroad</option>
                                <option value="no">Away from Mainroad</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Access to Public Transit</label>
                            <select id="prefarea">
                                <option value="yes" selected>yes</option>
                                <option value="no">no</option>
                            </select>
                        </div>
                    </div>
                </div>

            </div><!-- /form-grid -->

            <!-- Submit + Result -->
            <div class="predict-wrap">
                <button id="btn-predict" class="btn-predict" type="button">
                    <span id="btnTxt">Estimate Price →</span>
                </button>
                <div class="loading-dots" id="dots">
                    <span></span><span></span><span></span>
                </div>
                <div class="result-card" id="resultCard">
                    <div class="result-label">Estimated Market Value</div>
                    <div class="result-price" id="resultPrice">—</div>
                    <div class="result-range" id="resultRange"></div>
                </div>
            </div>

        </form>
        <br><br>
        <a href="/static/about.html" class="system-guide">View System Guide</a>

    </div>
